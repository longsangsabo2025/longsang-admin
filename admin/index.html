    <!-- Unregister old service workers in development -->
    <script>
      if ('serviceWorker' in navigator && window.location.hostname === 'localhost') {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    
    <!-- Auto-recover from stale SW cache chunk errors -->
    <script>
      (function(){
        var KEY = 'sw-cache-bust';
        var ts = sessionStorage.getItem(KEY);
        window.addEventListener('error', function(e) {
          var msg = e.message || '';
          if (msg.indexOf('createContext') !== -1 ||
              msg.indexOf('Loading chunk') !== -1 ||
              msg.indexOf('Failed to fetch dynamically') !== -1) {
            if (ts) return; // already tried once this session, don't loop
            sessionStorage.setItem(KEY, '1');
            if ('caches' in window) {
              caches.keys().then(function(ks){
                return Promise.all(ks.map(function(k){ return caches.delete(k); }));
              }).then(function(){
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(rs){
                    return Promise.all(rs.map(function(r){ return r.unregister(); }));
                  }).then(function(){ location.reload(); });
                } else { location.reload(); }
              });
            } else { location.reload(); }
          }
        }, true);
      })();
    </script>
